<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lecturer Login | AttendX</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="auth.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="ai-chat-widget.css">
</head>

<body>

  <div class="auth-wrapper">
    <div class="auth-card">

      <div class="auth-logo">
        <h2>👨‍🏫 AttendX</h2>
        <p>Lecturer Login</p>
      </div>

      <form id="loginForm">

        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" placeholder="e.g. lecturer@test.com" required>
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="Enter your password" required>
        </div>

        <div id="formMessage" class="form-message"></div>

        <button type="submit" id="loginBtn">Login</button>

      </form>

      <p class="auth-footer">
        <a href="forgot-password.html">Forgot password?</a>
      </p>

      <p class="auth-footer">
        <a href="index.html">&larr; Back to Home</a>
      </p>

    </div>
  </div>

  <script type="module" src="lecturer-login.js"></script>
  <script src="password-toggle.js" defer></script>

  <script src="ai-chat-widget.js" defer></script>

</body>
</html>
