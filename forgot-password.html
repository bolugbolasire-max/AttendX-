<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password | AttendX</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="auth.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="ai-chat-widget.css">
</head>

<body>

  <div class="auth-wrapper">
    <div class="auth-card">

      <div class="auth-logo">
        <h2>🔑 AttendX</h2>
        <p>Reset Your Password</p>
      </div>

      <form id="resetForm">

        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" placeholder="Enter the email on your account" required>
        </div>

        <div id="formMessage" class="form-message"></div>

        <button type="submit" id="resetBtn">Send Reset Link</button>

      </form>

      <p class="auth-footer">
        <a href="index.html">&larr; Back to Home</a>
      </p>

    </div>
  </div>

  <script type="module" src="forgot-password.js"></script>

  <script src="ai-chat-widget.js" defer></script>

</body>
</html>
